name: staticcheck

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup tools
        run: make setup-env

      - name: Staticcheck
        run: make staticcheck
