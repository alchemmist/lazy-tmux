version: 2
project_name: lazy-tmux

before:
  hooks:
    - go mod tidy
    - go test ./...
    - go test -tags lazy_fzf ./...

builds:
  - id: lazy-tmux
    main: ./cmd/lazy-tmux
    binary: lazy-tmux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: lazy-tmux-fzf
    main: ./cmd/lazy-tmux
    binary: lazy-tmux
    env:
      - CGO_ENABLED=0
    tags:
      - lazy_fzf
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids: [lazy-tmux]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  - id: fzf
    ids: [lazy-tmux-fzf]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}_fzf"

checksum:
  name_template: checksums.txt

changelog:
  use: git

brews:
  folder: Formula
  - name: lazy-tmux
    ids: [default]
    description: "Fast tmux session manager with TUI picker"
    homepage: "https://github.com/alchemmist/lazy-tmux"
    license: "MIT"
    repository:
      owner: alchemmist
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "lazy-tmux"
    test: |
      system "#{bin}/lazy-tmux", "--version"
  - name: lazy-tmux-fzf
    ids: [fzf]
    description: "Fast tmux session manager (fzf picker)"
    homepage: "https://github.com/alchemmist/lazy-tmux"
    license: "MIT"
    repository:
      owner: alchemmist
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "lazy-tmux" => "lazy-tmux-fzf"
    test: |
      system "#{bin}/lazy-tmux-fzf", "--version"
