project_name: lazy-tmux

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: lazy-tmux
    main: ./cmd/lazy-tmux
    binary: lazy-tmux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: lazy-tmux-fzf
    main: ./cmd/lazy-tmux
    binary: lazy-tmux
    env:
      - CGO_ENABLED=0
    tags:
      - lazy_fzf
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds: [lazy-tmux]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  - id: fzf
    builds: [lazy-tmux-fzf]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}_fzf"

checksum:
  name_template: checksums.txt

changelog:
  use: git
